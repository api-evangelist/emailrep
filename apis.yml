apis:
  - aid: emailrep:emailrep-api
    name: EmailRep API
    description: >-
      Email reputation and threat-intelligence REST API. `GET /{email}` returns
      a reputation verdict (high/medium/low/none), a `suspicious` flag, a
      `references` count, and a detailed signal block covering blacklisting,
      malicious activity, credential leaks, data breaches, domain age and
      reputation, deliverability, MX validity, SPF/DMARC posture,
      spoofability, free-provider/disposable status, and known online
      profiles. `POST /report` lets authenticated callers report an email
      address as malicious (BEC, phishing, fraud, account takeover, maldoc,
      etc.) so the signal feeds the reputation graph. Authentication is via a
      `Key` header issued from emailrep.io/key. Free tier: 250 queries/month,
      10/day; Commercial tier: 1,000 queries/month at $20/month with no daily
      limit; Enterprise: high-volume custom plans with SLA.
    humanURL: https://emailrep.io
