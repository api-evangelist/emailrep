aid: emailrep
name: EmailRep
description: >-
  EmailRep is an email address reputation and threat-intelligence API operated
  by Sublime Security, Inc. It crawls and enriches data across social media
  profiles, professional networking sites, dark-web credential leaks, data
  breaches, phishing kits, phishing emails, spam lists, open mail relays, spam
  traps, domain age and reputation, and email-deliverability signals to predict
  the risk associated with any email address. The free, JSON-over-HTTP REST API
  returns a `reputation`, a `suspicious` flag, a `references` count, and a
  detailed signal block (blacklisted, malicious_activity, credentials_leaked,
  data_breach, domain_reputation, deliverable, spoofable, profiles, and more).
  A POST `/report` endpoint lets analysts contribute observations of malicious
  email behavior back into the reputation graph.
