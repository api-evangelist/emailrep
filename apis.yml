features:
  - name: Reputation Verdict
    description: >-
      Each email lookup returns a `reputation` of `high`, `medium`, `low`, or
      `none` summarizing the overall trust signal for the address.
  - name: Suspicious Flag
    description: >-
      A boolean `suspicious` field indicates whether the email should be
      treated as risky based on combined positive and negative signals.
  - name: References Count
    description: >-
      `references` is the total number of positive and negative reputation
      sources observed for the address or its associated domain.
  - name: Credential-Leak and Breach Signals
    description: >-
      Detects whether the email has appeared in known data breaches, dark-web
      credential leaks, or pastes — historically and within the last 90 days.
  - name: Domain Reputation and Age
    description: >-
      Reports `domain_exists`, `domain_reputation`, `new_domain`, and
      `days_since_domain_creation` so callers can weight reputation against
      domain freshness.
  - name: Deliverability and Mail-Server Posture
    description: >-
      Reports `deliverable`, `accept_all`, `valid_mx`, `spoofable`,
      `spf_strict`, and `dmarc_enforced` for both fraud prevention and
      legitimate sender hygiene.
  - name: Provider Classification
    description: >-
      Classifies the address as `free_provider`, `disposable`,
      `suspicious_tld`, or `spam` to expose throwaway or low-quality
      accounts.
  - name: Online Profile Discovery
    description: >-
      Returns a `profiles` array enumerating social and professional
      networking sites where the email has been observed.
  - name: Crowd-Sourced Reporting
    description: >-
      `POST /report` accepts community submissions of malicious email
      behavior (BEC, phishing, fraud, account takeover, maldoc) with tags,
      description, timestamp, and an expires window so signal feeds the
      reputation graph.
useCases:
  - name: Phishing and BEC Detection
    description: >-
      Score inbound emails against EmailRep to identify suspicious senders,
      brand-spoofing attempts, and targeted Business Email Compromise.
  - name: Account-Signup Abuse Prevention
    description: >-
      Block or step-up disposable, throwaway, or known-malicious email
      addresses during user registration to reduce fraud and abuse.
  - name: Marketing List Hygiene
    description: >-
      Validate deliverability, catch-all status, and disposable-provider use
      on inbound or outbound marketing lists to protect sender reputation.
  - name: Threat-Intelligence Enrichment
    description: >-
      Enrich SIEM, SOAR, and case-management workflows with email reputation
      signals alongside netflow, EDR, and email-gateway telemetry.
  - name: Sender-Reputation Self-Check
    description: >-
      Marketing, sales, and outbound teams can verify their own addresses to
      ensure they aren't trapped on spam lists or blocklists.
  - name: Red-Team and Recon
    description: >-
      Authorized offensive-security teams can profile target email addresses
      for credential brute forcing and targeted phishing-engagement design.
integrations:
  - name: Sublime Platform
    description: >-
      Native consumer of EmailRep signals inside the Sublime Security email
      detection-and-response platform for inbound email threat hunting and
      response.
  - name: Sublime Rules
    description: >-
      Open-source MQL detection rules in github.com/sublime-security/sublime-rules
      can call EmailRep enrichment as part of email-attack detection.
  - name: OpenCTI Connectors
    description: >-
      EmailRep enrichment is callable from threat-intel platforms via the
      Sublime-maintained OpenCTI connectors repo.
  - name: SOAR Playbooks
    description: >-
      EmailRep is widely used as an enrichment node in SOAR products
      (Tines, Splunk SOAR, Cortex XSOAR, Torq) for phishing triage.
  - name: Python, PowerShell, R, .NET, Go SDKs
    description: >-
      First-party Python SDK plus community-maintained PowerShell, R, .NET,
      and Go libraries make EmailRep callable from analyst tooling.
solutions:
  - name: Email Threat Intelligence
    description: >-
      Reputation, breach exposure, and online-profile signals on any email
      address, queryable in a single HTTP call.
  - name: Account-Takeover and Fraud Prevention
    description: >-
      Disposable, free-provider, new-domain, and recent-credential-leak
      signals support sign-up abuse and ATO defenses.
  - name: Email Hygiene and Deliverability Insight
    description: >-
      Deliverable, accept-all, MX, SPF, and DMARC signals support
      marketing, sales, and IT-ops list hygiene work.
